# =============================================================================
# AI 代码评审 — Codex CLI 版
# -----------------------------------------------------------------------------
# 当前活跃路径:
#   secrets.OPENAI_API_KEY      Pro/个人版可用;走 OpenAI Platform 计费
#   secrets.CODEX_ACCESS_TOKEN  Business/Enterprise workspace 可用
#   vars.CODEX_MODEL            可选;不设则使用 Codex 默认模型
#   vars.CODEX_CLI_VERSION      可选;默认 latest
#
# Legacy 云上 LLM 评审已注释停用:
#   vars.LLM_PROVIDER
#   secrets.LLM_API_KEY
#   vars.LLM_BASE_URL
#   vars.LLM_MODEL_VERIFIER_*
#   python3 scripts/ai_review.py --pass <quality|security|dependency>
# =============================================================================
name: AI Review (Codex CLI)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  CODEX_MODEL: ${{ vars.CODEX_MODEL }}
  CODEX_CLI_VERSION: ${{ vars.CODEX_CLI_VERSION }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPOSITORY: ${{ github.repository }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  BASE_REF: ${{ github.base_ref }}

jobs:
  quality:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Codex CLI
        run: npm install -g "@openai/codex@${CODEX_CLI_VERSION:-latest}"
      - name: Pass 1 — Code Quality
        run: bash scripts/codex_review.sh --pass quality --base "$BASE_REF"

  security:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Codex CLI
        run: npm install -g "@openai/codex@${CODEX_CLI_VERSION:-latest}"
      - name: Pass 2 — Security
        run: bash scripts/codex_review.sh --pass security --base "$BASE_REF"

  dependency:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Codex CLI
        run: npm install -g "@openai/codex@${CODEX_CLI_VERSION:-latest}"
      - name: Pass 3 — Dependency
        run: bash scripts/codex_review.sh --pass dependency --base "$BASE_REF"

  ai-review-gate:
    needs: [quality, security, dependency]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce all passes
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "AI review results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::AI review gate failed — see Codex review comments and job logs."
              exit 1
            fi
          done
          echo "✅ AI review gate green."
