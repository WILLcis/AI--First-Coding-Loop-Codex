# 本仓用自己的 reusable workflow 评审自己的 PR——harness 哲学的字面体现。
# 配套配置:
#   secrets.CLAUDE_CODE_OAUTH_TOKEN  Claude Code OAuth token
#   vars.CLAUDE_MODEL                可选；不设则用 Claude Code 默认模型
name: Self Review
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    uses: WILLcis/AI--First-Coding-Loop-Codex/.github/workflows/ai-review-reusable.yml@main
    secrets: inherit
    with:
      claude_model: ${{ vars.CLAUDE_MODEL }}
