# 本仓用自己的 reusable workflow 评审自己的 PR——harness 哲学的字面体现。
# 配套配置:
#   secrets.CODEX_ACCESS_TOKEN  官方 Codex access token
#   vars.CODEX_MODEL            可选；不设则用 Codex 默认模型
name: Self Review
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    uses: WILLcis/AI--First-Coding-Loop-Codex/.github/workflows/ai-review-reusable.yml@main
    secrets: inherit
    with:
      codex_model: ${{ vars.CODEX_MODEL }}
