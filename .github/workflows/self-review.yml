# 本仓用自己的 reusable workflow 评审自己的 PR——harness 哲学的字面体现。
# 配套配置:
#   secrets.LLM_API_KEY     可选；未设置时走 stub 路径
#   vars.LLM_PROVIDER       默认 openai
#   vars.LLM_MODEL          全局默认模型(例 gpt-5.5)
name: Self Review
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    uses: WILLcis/AI--First-Coding-Loop-Codex/.github/workflows/ai-review-reusable.yml@main
    secrets: inherit
    with:
      provider: ${{ vars.LLM_PROVIDER }}
      model_default: ${{ vars.LLM_MODEL }}
