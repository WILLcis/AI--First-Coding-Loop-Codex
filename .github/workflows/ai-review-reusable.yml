# =============================================================================
# Reusable AI Review Workflow — Claude Code TOKEN 版
# -----------------------------------------------------------------------------
# 调用方仓库的用法(示例):
#
#   name: PR Review
#   on:
#     pull_request:
#       branches: [main]
#       types: [opened, synchronize, reopened, ready_for_review]
#
#   jobs:
#     review:
#       uses: WILLcis/AI--First-Coding-Loop-Codex/.github/workflows/ai-review-reusable.yml@v2.6.4
#       secrets:
#         CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#       with:
#         ref: v2.6.4
#
# Legacy 路径已停用:
#   Codex CLI: OPENAI_API_KEY / CODEX_ACCESS_TOKEN / codex_review.sh
#   云上 LLM: LLM_API_KEY / provider / ai_review.py
# =============================================================================
name: AI Review (Reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: '拉哪个版本的 AI-First Coding Loop(分支名/tag/SHA)'
        type: string
        required: false
        default: 'main'
      claude_model:
        description: 'Claude Code 评审模型;留空则使用 Claude Code 默认模型'
        type: string
        required: false
        default: ''

      # Deprecated legacy inputs: accepted for compatibility but not used.
      codex_model:
        description: '[deprecated] Codex review is no longer active'
        type: string
        required: false
        default: ''
      codex_cli_version:
        description: '[deprecated] Codex review is no longer active'
        type: string
        required: false
        default: ''
      provider:
        description: '[deprecated] legacy LLM provider; Claude Code review ignores this'
        type: string
        required: false
        default: ''
      base_url:
        description: '[deprecated] legacy LLM base URL; Claude Code review ignores this'
        type: string
        required: false
        default: ''
      model_default:
        description: '[deprecated] legacy LLM model; Claude Code review ignores this'
        type: string
        required: false
        default: ''
      model_quality:
        description: '[deprecated] legacy quality model; Claude Code review ignores this'
        type: string
        required: false
        default: ''
      model_security:
        description: '[deprecated] legacy security model; Claude Code review ignores this'
        type: string
        required: false
        default: ''
      model_dependency:
        description: '[deprecated] legacy dependency model; Claude Code review ignores this'
        type: string
        required: false
        default: ''
      python_version:
        description: '[deprecated] legacy Python version; Claude Code review ignores this'
        type: string
        required: false
        default: ''
      max_diff_chars:
        description: '[deprecated] legacy diff truncation; Claude Code review ignores this'
        type: string
        required: false
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: 'Claude Code OAuth token'
        required: true
      CODEX_ACCESS_TOKEN:
        description: '[deprecated] Codex review is no longer active'
        required: false
      OPENAI_API_KEY:
        description: '[deprecated] Codex review is no longer active'
        required: false
      LLM_API_KEY:
        description: '[deprecated] legacy LLM API key; Claude Code review ignores this'
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Checkout AI-First Coding Loop (this repo)
        uses: actions/checkout@v4
        with:
          repository: WILLcis/AI--First-Coding-Loop-Codex
          ref: ${{ inputs.ref }}
          path: _aifcl
      - id: prepare
        name: Prepare Pass 1 Prompt
        env:
          AIFCL_PROMPTS_DIR: _aifcl/core/prompts
          BASE_REF: ${{ github.base_ref }}
        run: bash _aifcl/core/scripts/claude_review_prepare.sh --pass quality --base "$BASE_REF" --prompts-dir "$AIFCL_PROMPTS_DIR" --out "$RUNNER_TEMP/claude-review-quality-prompt.md" --review-file "$RUNNER_TEMP/claude-review-quality.md"
      - id: claude
        name: Pass 1 — Code Quality
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: ${{ steps.prepare.outputs.prompt_file }}
          claude_args: ${{ inputs.claude_model != '' && format('--max-turns 8 --model {0}', inputs.claude_model) || '--max-turns 8' }}
      - name: Enforce Pass 1
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node _aifcl/core/scripts/claude_review_finish.js --pass quality --execution-file "${{ steps.claude.outputs.execution_file }}"

  security:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Checkout AI-First Coding Loop (this repo)
        uses: actions/checkout@v4
        with:
          repository: WILLcis/AI--First-Coding-Loop-Codex
          ref: ${{ inputs.ref }}
          path: _aifcl
      - id: prepare
        name: Prepare Pass 2 Prompt
        env:
          AIFCL_PROMPTS_DIR: _aifcl/core/prompts
          BASE_REF: ${{ github.base_ref }}
        run: bash _aifcl/core/scripts/claude_review_prepare.sh --pass security --base "$BASE_REF" --prompts-dir "$AIFCL_PROMPTS_DIR" --out "$RUNNER_TEMP/claude-review-security-prompt.md" --review-file "$RUNNER_TEMP/claude-review-security.md"
      - id: claude
        name: Pass 2 — Security
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: ${{ steps.prepare.outputs.prompt_file }}
          claude_args: ${{ inputs.claude_model != '' && format('--max-turns 8 --model {0}', inputs.claude_model) || '--max-turns 8' }}
      - name: Enforce Pass 2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node _aifcl/core/scripts/claude_review_finish.js --pass security --execution-file "${{ steps.claude.outputs.execution_file }}"

  dependency:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Checkout AI-First Coding Loop (this repo)
        uses: actions/checkout@v4
        with:
          repository: WILLcis/AI--First-Coding-Loop-Codex
          ref: ${{ inputs.ref }}
          path: _aifcl
      - id: prepare
        name: Prepare Pass 3 Prompt
        env:
          AIFCL_PROMPTS_DIR: _aifcl/core/prompts
          BASE_REF: ${{ github.base_ref }}
        run: bash _aifcl/core/scripts/claude_review_prepare.sh --pass dependency --base "$BASE_REF" --prompts-dir "$AIFCL_PROMPTS_DIR" --out "$RUNNER_TEMP/claude-review-dependency-prompt.md" --review-file "$RUNNER_TEMP/claude-review-dependency.md"
      - id: claude
        name: Pass 3 — Dependency
        if: steps.prepare.outputs.skip != '1'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: ${{ steps.prepare.outputs.prompt_file }}
          claude_args: ${{ inputs.claude_model != '' && format('--max-turns 8 --model {0}', inputs.claude_model) || '--max-turns 8' }}
      - name: Enforce Pass 3
        if: steps.prepare.outputs.skip != '1'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node _aifcl/core/scripts/claude_review_finish.js --pass dependency --execution-file "${{ steps.claude.outputs.execution_file }}"
      - name: Enforce Skipped Pass 3
        if: steps.prepare.outputs.skip == '1'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node _aifcl/core/scripts/claude_review_finish.js --pass dependency --review-file "${{ steps.prepare.outputs.review_file }}"

  ai-review-gate:
    needs: [quality, security, dependency]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce all passes
        run: |
          for r in ${{ needs.quality.result }} ${{ needs.security.result }} ${{ needs.dependency.result }}; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::AI review gate failed — see Claude Code review comments and job logs."
              exit 1
            fi
          done
          echo "✅ AI review gate green."
