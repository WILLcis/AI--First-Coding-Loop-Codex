# =============================================================================
# Reusable AI Review Workflow — Codex CLI 版
# -----------------------------------------------------------------------------
# 调用方仓库的用法(示例):
#
#   name: PR Review
#   on:
#     pull_request:
#       branches: [main]
#       types: [opened, synchronize, reopened, ready_for_review]
#
#   jobs:
#     review:
#       uses: WILLcis/AI--First-Coding-Loop-Codex/.github/workflows/ai-review-reusable.yml@v2.6.3
#       secrets:
#         OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
#       with:
#         ref: v2.6.3
#
# Legacy 云上 LLM 评审已注释停用:
#   secrets.LLM_API_KEY
#   inputs.provider/base_url/model_*
#   python3 _aifcl/core/scripts/ai_review.py --pass ...
# =============================================================================
name: AI Review (Reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: '拉哪个版本的 AI-First Coding Loop(分支名/tag/SHA)'
        type: string
        required: false
        default: 'main'
      codex_model:
        description: 'Codex 评审模型;留空则使用 Codex 默认模型'
        type: string
        required: false
        default: ''
      codex_cli_version:
        description: '@openai/codex npm 版本'
        type: string
        required: false
        default: 'latest'

      # Deprecated legacy LLM inputs: accepted for compatibility but not used.
      provider:
        description: '[deprecated] legacy LLM provider; Codex review ignores this'
        type: string
        required: false
        default: ''
      base_url:
        description: '[deprecated] legacy LLM base URL; Codex review ignores this'
        type: string
        required: false
        default: ''
      model_default:
        description: '[deprecated] legacy LLM model; Codex review ignores this'
        type: string
        required: false
        default: ''
      model_quality:
        description: '[deprecated] legacy quality model; Codex review ignores this'
        type: string
        required: false
        default: ''
      model_security:
        description: '[deprecated] legacy security model; Codex review ignores this'
        type: string
        required: false
        default: ''
      model_dependency:
        description: '[deprecated] legacy dependency model; Codex review ignores this'
        type: string
        required: false
        default: ''
      python_version:
        description: '[deprecated] legacy Python version; Codex review ignores this'
        type: string
        required: false
        default: ''
      max_diff_chars:
        description: '[deprecated] legacy diff truncation; Codex review ignores this'
        type: string
        required: false
        default: ''
    secrets:
      CODEX_ACCESS_TOKEN:
        description: 'Business/Enterprise 官方 Codex access token;用于受信任 GitHub Actions 自动化评审'
        required: false
      OPENAI_API_KEY:
        description: 'OpenAI Platform API key;Pro/个人版用户用这个'
        required: false
      LLM_API_KEY:
        description: '[deprecated] legacy LLM API key; Codex review ignores this'
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Checkout AI-First Coding Loop (this repo)
        uses: actions/checkout@v4
        with:
          repository: WILLcis/AI--First-Coding-Loop-Codex
          ref: ${{ inputs.ref }}
          path: _aifcl
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Codex CLI
        env:
          CODEX_CLI_VERSION: ${{ inputs.codex_cli_version }}
        run: npm install -g "@openai/codex@${CODEX_CLI_VERSION:-latest}"
      - name: Pass 1 — Code Quality
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: ${{ inputs.codex_model }}
          AIFCL_PROMPTS_DIR: _aifcl/core/prompts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: bash _aifcl/core/scripts/codex_review.sh --pass quality --base "$BASE_REF" --prompts-dir "$AIFCL_PROMPTS_DIR"

  security:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Checkout AI-First Coding Loop (this repo)
        uses: actions/checkout@v4
        with:
          repository: WILLcis/AI--First-Coding-Loop-Codex
          ref: ${{ inputs.ref }}
          path: _aifcl
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Codex CLI
        env:
          CODEX_CLI_VERSION: ${{ inputs.codex_cli_version }}
        run: npm install -g "@openai/codex@${CODEX_CLI_VERSION:-latest}"
      - name: Pass 2 — Security
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: ${{ inputs.codex_model }}
          AIFCL_PROMPTS_DIR: _aifcl/core/prompts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: bash _aifcl/core/scripts/codex_review.sh --pass security --base "$BASE_REF" --prompts-dir "$AIFCL_PROMPTS_DIR"

  dependency:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Checkout AI-First Coding Loop (this repo)
        uses: actions/checkout@v4
        with:
          repository: WILLcis/AI--First-Coding-Loop-Codex
          ref: ${{ inputs.ref }}
          path: _aifcl
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install Codex CLI
        env:
          CODEX_CLI_VERSION: ${{ inputs.codex_cli_version }}
        run: npm install -g "@openai/codex@${CODEX_CLI_VERSION:-latest}"
      - name: Pass 3 — Dependency
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: ${{ inputs.codex_model }}
          AIFCL_PROMPTS_DIR: _aifcl/core/prompts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: bash _aifcl/core/scripts/codex_review.sh --pass dependency --base "$BASE_REF" --prompts-dir "$AIFCL_PROMPTS_DIR"

  ai-review-gate:
    needs: [quality, security, dependency]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce all passes
        run: |
          for r in ${{ needs.quality.result }} ${{ needs.security.result }} ${{ needs.dependency.result }}; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::AI review gate failed — see Codex review comments and job logs."
              exit 1
            fi
          done
          echo "✅ AI review gate green."
